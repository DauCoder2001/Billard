<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Billard Scoreboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #dddddd;
  overflow: hidden;
}

/* Header */
#header {
  background: #1f3b73;
  color: white;
  text-align: center;
  font-size: 36px;
  padding: 10px;
}

/* Spieler */
#players {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 30px;
  font-size: 52px;
  font-weight: bold;
}

.player-box {
  flex: 1;
  text-align: center;
}

.player-left {
  color: red;
}

.player-right {
  color: blue;
}

.edit-btn {
  font-size: 16px;
  margin-top: 5px;
}

/* Score Hauptbereich */
#scores {
  display: flex;
  height: 60vh;
}

.score {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 320px;   /* 🔥 großer für iPad */
  font-weight: bold;
  user-select: none;
}

#s1 { color: red; }
#s2 { color: blue; }

/* Controls */
#controls {
  text-align: center;
  padding: 10px;
}

button {
  font-size: 16px;
  padding: 8px 12px;
  margin: 4px;
}
</style>

</head>

<body>

<div id="header">SCOREBOARD</div>

<div id="players">
  <div class="player-box">
    <div id="p1" class="player-left">Spieler 1</div>
    <button class="edit-btn" onclick="changeName(1)">✏️</button>
  </div>

  <div class="player-box">
    <div id="p2" class="player-right">Spieler 2</div>
    <button class="edit-btn" onclick="changeName(2)">✏️</button>
  </div>
</div>

<div id="scores">
  <div id="s1" class="score">0</div>
  <div id="s2" class="score">0</div>
</div>

<div id="controls">
  <button onclick="add(1,10)">+10 Blau</button>
  <button onclick="sub(1)">-1 Blau</button>

  <button onclick="add(2,10)">+10 Rot</button>
  <button onclick="sub(2)">-1 Rot</button>

  <br>

  <button onclick="swap()">↔ Seitenwechsel</button>
  <button onclick="newGame()">🔄 Neues Spiel</button>
</div>

<script>
let state = {
  player1: "Spieler 1",
  player2: "Spieler 2",
  score1: 0,
  score2: 0
};

function load() {
  let saved = localStorage.getItem("billard");
  if (saved) state = JSON.parse(saved);
  render();
}

function save() {
  localStorage.setItem("billard", JSON.stringify(state));
}

function render() {
  document.getElementById("p1").textContent = state.player1;
  document.getElementById("p2").textContent = state.player2;
  document.getElementById("s1").textContent = state.score1;
  document.getElementById("s2").textContent = state.score2;
}

/* Punkte */
function add(player, amount=1) {
  if (player === 1) state.score1 += amount;
  else state.score2 += amount;
  save(); render();
}

function sub(player) {
  if (player === 1) state.score1 = Math.max(0, state.score1 - 1);
  else state.score2 = Math.max(0, state.score2 - 1);
  save(); render();
}

/* Tap = +1 */
document.getElementById("s1").addEventListener("click", () => add(1));
document.getElementById("s2").addEventListener("click", () => add(2));

/* LongPress = -1 */
let timerPress;

function setupLongPress(id, player) {
  let el = document.getElementById(id);

  el.addEventListener("touchstart", () => {
    timerPress = setTimeout(() => sub(player), 500);
  });

  el.addEventListener("touchend", () => clearTimeout(timerPress));
}

setupLongPress("s1",1);
setupLongPress("s2",2);

/* Swap */
function swap() {
  [state.player1, state.player2] = [state.player2, state.player1];
  [state.score1, state.score2] = [state.score2, state.score1];
  save(); render();
}

/* Namen ändern */
function changeName(player) {
  let name = prompt("Neuer Name:");
  if (!name) return;

  if (player === 1) state.player1 = name;
  else state.player2 = name;

  save(); render();
}

/* Neues Spiel */
function newGame() {
  if (!confirm("Neues Spiel starten?")) return;

  state.score1 = 0;
  state.score2 = 0;

  if (confirm("Spieler neu eingeben?")) {
    state.player1 = prompt("Spieler Blau:", state.player1);
    state.player2 = prompt("Spieler Rot:", state.player2);
  }

  save(); render();
}

load();
</script>

</body>
</html>
