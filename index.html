
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Billard Tisch</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

/* ✅ Eingabemaske */
#setup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  z-index: 20000;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#setup input {
  font-size: 28px;
  padding: 10px;
  margin: 10px;
  width: 300px;
  text-align: center;
}

#setup button {
  font-size: 24px;
  padding: 10px 30px;
  margin-top: 20px;
}

/* ✅ Overlay (JETZT sauber zentriert!) */
#overlay {
  position: fixed;
  top: 80px;
  width: 100%;
  height: 60px;

  display: flex;
  align-items: center;

  font-size: 42px;
  font-weight: bold;

  background: transparent;
  z-index: 9999;
}

/* ✅ 3 gleiche Bereiche */
.player-left, .vs, .player-right {
  flex: 1;
  text-align: center;
}

/* ✅ Farben */
.player-left {
  color: red;
}

.player-right {
  color: darkblue;

}

.vs {
  font-size: 28px;
  opacity: 0.7;
  color: black;
}

/* ✅ Button jetzt OBEN – kollidiert nicht mehr */
#swapBtn {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10000;

  font-size: 16px;
  padding: 6px 12px;

  background: orange;
  border: none;
  border-radius: 6px;
}

/* ✅ iframe sauber */
iframe {
  border: none;
  width: 100%;
  height: calc(100vh - 140px);
  margin-top: 140px;
}
</style>
</head>

<body>

<!-- ✅ Eingabe -->
<div id="setup">
  <h1>Spieler eingeben</h1>
  <input id="input1" placeholder="Spieler links (blau)">
  <input id="input2" placeholder="Spieler rechts (rot)">
  <button onclick="startGame()">Start</button>
</div>

<!-- ✅ Anzeige -->
<div id="overlay" style="display:none;">
  <span id="p1" class="player-left">Spieler 1</span>
  <span class="vs">vs</span>
  <span id="p2" class="player-right">Spieler 2</span>
</div>

<button id="swapBtn" style="display:none;">↔ Wechsel</button>

<!-- ✅ WICHTIG: korrektes iframe -->
<iframe src="http://billard-live.org/mw/8-9-10/scoreboard.html"></iframe>

<script>
let player1 = "Spieler 1";
let player2 = "Spieler 2";

/* ✅ Spiel starten */
function startGame() {
  player1 = document.getElementById("input1").value || "Spieler 1";
  player2 = document.getElementById("input2").value || "Spieler 2";

  document.getElementById("setup").style.display = "none";
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("swapBtn").style.display = "block";

  render();
}

/* ✅ Namen anzeigen */
function render() {
  document.getElementById("p1").textContent = player1;
  document.getElementById("p2").textContent = player2;
}

/* ✅ Spieler tauschen (Break) */
document.getElementById("swapBtn").addEventListener("click", function () {
  let temp = player1;
  player1 = player2;
  player2 = temp;
  render();
});

/* ✅ Hidden Reset (3x Tippen) */
document.body.addEventListener("click", function (e) {
  if (e.detail === 3) {
    document.getElementById("setup").style.display = "flex";
    document.getElementById("overlay").style.display = "none";
    document.getElementById("swapBtn").style.display = "none";
  }
});
</script>

</body>
</html>
