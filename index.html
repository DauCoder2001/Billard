<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<title>8/9/10-Ball Scoreboard – Standalone</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #dddddd;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* Header */
  #header {
    background: #1f3b73;
    color: white;
    text-align: center;
    font-size: 4vmin;
    padding: 1vmin 10vmin;
    position: relative;
  }
  #clock { position: absolute; right: 2vmin; top: 1vmin; font-size: 3vmin; font-weight: bold; }
  #demo-tag {
    position: absolute; left: 2vmin; top: 1.6vmin;
    font-size: 2vmin; font-weight: bold;
    background: rgba(255,255,255,0.15);
    padding: 0.3vmin 1.2vmin; border-radius: 1vmin;
  }

  /* Break-Anzeige */
  #break-info { text-align: center; font-size: 4vmin; font-weight: bold; margin-top: 1vmin; }
  #break-text { color: red; }

  /* Spieler */
  #players {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1vmin 4vmin; font-size: 6vmin; font-weight: bold;
    position: relative; z-index: 5;
  }
  .player-box { flex: 1; text-align: center; }
  .player-left { color: red; }
  .player-right { color: blue; }
  .edit-btn { font-size: 2.5vmin; margin-top: 1vmin; cursor: pointer; }

  /* Score Hauptbereich */
  #scores {
    display: grid; grid-template-columns: 1fr auto 1fr;
    height: 40vh; position: relative; z-index: 1;
  }
  .score {
    display: flex; justify-content: center; align-items: center;
    font-size: 30vmin; font-weight: bold; user-select: none; cursor: pointer;
  }
  #s1 { color: red; }
  #s2 { color: blue; }
  #colon { font-size: 12vmin; font-weight: bold; display: flex; align-items: center; justify-content: center; }

  /* Buttons unter den Scores */
  #controls {
    display: grid; grid-template-columns: 1fr auto 1fr;
    margin-top: 2vmin; align-items: center; position: relative; z-index: 10;
  }
  .control-row { display: flex; justify-content: center; gap: 4vmin; }

  /* Untere Buttons */
  #bottom-controls { text-align: center; margin-top: 2vmin; }

  button {
    font-size: 3.5vmin; padding: 1.5vmin 2.5vmin; margin: 1vmin;
    border-radius: 1vmin; border: none; background: #f0f0f0; cursor: pointer;
  }
  button:disabled { opacity: 0.4; }
</style>

<script>
  /* Eigene Dialoge (Ersatz fuer alert/confirm/prompt) – inline, damit die Datei eigenstaendig ist. */
  (function () {
    const style = document.createElement('style');
    style.textContent =
      '.app-dlg-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:99999;}' +
      '.app-dlg-box{background:#fff;color:#333;border-radius:10px;padding:22px 24px;max-width:460px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.35);font-family:Arial,sans-serif;}' +
      '.app-dlg-box .app-dlg-title{font-weight:bold;color:#1f3b73;font-size:16px;margin-bottom:10px;}' +
      '.app-dlg-box .app-dlg-msg{white-space:pre-wrap;font-size:15px;line-height:1.5;}' +
      '.app-dlg-box .app-dlg-input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;margin-top:12px;box-sizing:border-box;}' +
      '.app-dlg-box .app-dlg-actions{text-align:right;margin-top:18px;}' +
      '.app-dlg-box .app-dlg-actions button{margin-left:8px;}' +
      '.app-dlg-box button{background:#1f3b73;color:#fff;border:none;padding:9px 22px;border-radius:7px;font-weight:bold;font-size:14px;cursor:pointer;}' +
      '.app-dlg-box button:hover{background:#16294f;}' +
      '.app-dlg-box button.app-dlg-cancel{background:#6c757d;}' +
      '.app-dlg-box button.app-dlg-cancel:hover{background:#5a6268;}';
    (document.head || document.documentElement).appendChild(style);

    function buildOverlay(innerHTML) {
      const ov = document.createElement('div');
      ov.className = 'app-dlg-overlay';
      ov.innerHTML = '<div class="app-dlg-box" role="dialog" aria-modal="true">' + innerHTML + '</div>';
      document.body.appendChild(ov);
      return ov;
    }

    const TITLE = '<div class="app-dlg-title">🎱 8-9-10 Scoreboard</div>';

    window.alert = function (msg) {
      const ov = buildOverlay(TITLE +
        '<div class="app-dlg-msg"></div>' +
        '<div class="app-dlg-actions"><button type="button" class="app-dlg-ok">OK</button></div>');
      ov.querySelector('.app-dlg-msg').textContent = String(msg == null ? '' : msg);
      const close = () => { ov.remove(); document.removeEventListener('keydown', onKey); };
      function onKey(e) { if (e.key === 'Escape' || e.key === 'Enter') close(); }
      ov.querySelector('.app-dlg-ok').addEventListener('click', close);
      ov.addEventListener('click', (e) => { if (e.target === ov) close(); });
      document.addEventListener('keydown', onKey);
      ov.querySelector('.app-dlg-ok').focus();
    };

    window.confirmModal = function (msg) {
      return new Promise((resolve) => {
        const ov = buildOverlay(TITLE +
          '<div class="app-dlg-msg"></div>' +
          '<div class="app-dlg-actions">' +
          '<button type="button" class="app-dlg-cancel">Abbrechen</button>' +
          '<button type="button" class="app-dlg-ok">OK</button></div>');
        ov.querySelector('.app-dlg-msg').textContent = String(msg == null ? '' : msg);
        const done = (val) => { ov.remove(); document.removeEventListener('keydown', onKey); resolve(val); };
        function onKey(e) { if (e.key === 'Escape') done(false); else if (e.key === 'Enter') done(true); }
        ov.querySelector('.app-dlg-ok').addEventListener('click', () => done(true));
        ov.querySelector('.app-dlg-cancel').addEventListener('click', () => done(false));
        ov.addEventListener('click', (e) => { if (e.target === ov) done(false); });
        document.addEventListener('keydown', onKey);
        ov.querySelector('.app-dlg-ok').focus();
      });
    };

    window.promptModal = function (msg, vorgabe, opts) {
      opts = opts || {};
      return new Promise((resolve) => {
        const ov = buildOverlay(TITLE +
          '<div class="app-dlg-msg"></div>' +
          '<input type="text" class="app-dlg-input">' +
          '<div class="app-dlg-actions">' +
          '<button type="button" class="app-dlg-cancel">Abbrechen</button>' +
          '<button type="button" class="app-dlg-ok">OK</button></div>');
        ov.querySelector('.app-dlg-msg').textContent = String(msg == null ? '' : msg);
        const inp = ov.querySelector('.app-dlg-input');
        inp.value = vorgabe == null ? '' : String(vorgabe);
        if (opts.maxLength) inp.maxLength = opts.maxLength;
        if (opts.numeric) {
          inp.inputMode = 'numeric';
          inp.addEventListener('input', () => {
            let v = inp.value.replace(/\D/g, '');
            if (opts.maxLength) v = v.slice(0, opts.maxLength);
            inp.value = v;
          });
        }
        const done = (val) => { ov.remove(); document.removeEventListener('keydown', onKey); resolve(val); };
        function onKey(e) { if (e.key === 'Escape') done(null); }
        ov.querySelector('.app-dlg-ok').addEventListener('click', () => done(inp.value));
        ov.querySelector('.app-dlg-cancel').addEventListener('click', () => done(null));
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); done(inp.value); } });
        ov.addEventListener('click', (e) => { if (e.target === ov) done(null); });
        document.addEventListener('keydown', onKey);
        setTimeout(() => { inp.focus(); inp.select(); }, 30);
      });
    };
  })();
</script>
</head>

<body>

<div id="header">8-9-10 SCOREBOARD<span id="demo-tag">Demo</span><div id="clock"></div></div>

<div id="break-info">
  <span id="break-text">Next Break: Rot</span>
</div>

<div id="players">
  <div class="player-box">
    <div id="p1" class="player-left">Spieler 1</div>
    <button class="edit-btn" type="button" onclick="changeName(1)">✏️</button>
  </div>

  <div class="player-box">
    <div id="p2" class="player-right">Spieler 2</div>
    <button class="edit-btn" type="button" onclick="changeName(2)">✏️</button>
  </div>
</div>

<div id="scores">
  <div id="s1" class="score">0</div>
  <div id="colon">:</div>
  <div id="s2" class="score">0</div>
</div>

<div id="controls">
  <div class="control-row">
    <button class="btn-add" type="button" onclick="add(1)">+1</button>
    <button type="button" onclick="sub(1)">-1</button>
  </div>

  <div></div>

  <div class="control-row">
    <button class="btn-add" type="button" onclick="add(2)">+1</button>
    <button type="button" onclick="sub(2)">-1</button>
  </div>
</div>

<div id="bottom-controls">
  <button id="btn-swap" type="button" onclick="swap()">↔ Seitenwechsel</button>
  <button id="btn-newgame" type="button" onclick="newGame()">🔄 Neues Match</button>
</div>

<script>
  /* =====================================================================
     8-9-10 Scoreboard – STANDALONE (ohne Firebase / Turnier)
     Spielstand wird lokal im Browser (localStorage) gespeichert.
     ===================================================================== */

  const LS_KEY = "billardpool_standalone";

  function freshState() {
    return { player1: "Spieler 1", player2: "Spieler 2", score1: 0, score2: 0, nextBreak: 1 };
  }
  let state = freshState();

  function save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function load() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (p && typeof p === "object") state = Object.assign(freshState(), p);
      }
    } catch (e) {}
  }

  function updateBreakDisplay() {
    const el = document.getElementById("break-text");
    if (state.nextBreak === 1) { el.textContent = "Next Break: Rot"; el.style.color = "red"; }
    else { el.textContent = "Next Break: Blau"; el.style.color = "blue"; }
  }

  function render() {
    document.getElementById("p1").textContent = state.player1;
    document.getElementById("p2").textContent = state.player2;
    document.getElementById("s1").textContent = state.score1;
    document.getElementById("s2").textContent = state.score2;
    updateBreakDisplay();
  }

  // Anstossrecht wechselt nach jedem gewerteten Punkt (wie im Online-Board).
  function toggleBreak() { state.nextBreak = (state.nextBreak === 1 ? 2 : 1); }

  function add(player) {
    if (player === 1) state.score1++; else state.score2++;
    toggleBreak();
    save(); render();
  }

  function sub(player) {
    let changed = false;
    if (player === 1 && state.score1 > 0) { state.score1--; changed = true; }
    if (player === 2 && state.score2 > 0) { state.score2--; changed = true; }
    if (!changed) return;
    toggleBreak();
    save(); render();
  }

  function swap() {
    [state.player1, state.player2] = [state.player2, state.player1];
    [state.score1, state.score2] = [state.score2, state.score1];
    save(); render();
  }

  async function changeName(player) {
    const name = (await promptModal("Neuer Name:") || '').trim();
    if (!name) return;
    if (player === 1) state.player1 = name; else state.player2 = name;
    save(); render();
  }

  async function newGame() {
    if (!await confirmModal("Neues Match starten (Punkte zurücksetzen)?")) return;
    state.score1 = 0;
    state.score2 = 0;
    state.nextBreak = 1;
    if (await confirmModal("Spieler neu eingeben?")) {
      state.player1 = (await promptModal("Name Spieler Rot:", state.player1) || state.player1).trim() || state.player1;
      state.player2 = (await promptModal("Name Spieler Blau:", state.player2) || state.player2).trim() || state.player2;
    }
    save(); render();
  }

  // onclick-Handler aus dem HTML global verfuegbar machen
  window.add = add;
  window.sub = sub;
  window.swap = swap;
  window.changeName = changeName;
  window.newGame = newGame;

  // Klick auf die grossen Zaehler = +1
  document.getElementById("s1").addEventListener("click", () => add(1));
  document.getElementById("s2").addEventListener("click", () => add(2));

  function updateClock() {
    document.getElementById("clock").textContent =
      new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
  }
  setInterval(updateClock, 1000);

  /* Start */
  load();
  render();
  updateClock();
</script>

</body>
</html>
