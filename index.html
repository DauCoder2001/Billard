<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Billard Scoreboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #dddddd;
  overflow: hidden;
}

/* Header */
#header {
  background: #1f3b73;
  color: white;
  text-align: center;
  font-size: 32px;
  padding: 8px;
}

/* Break-Anzeige */
#break-info {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  margin-top: 4px;
}

#break-text {
  color: red;
}

/* Spieler */
#players {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 20px;
  font-size: 42px;
  font-weight: bold;
  position: relative;
  z-index: 5;
}

.player-box {
  flex: 1;
  text-align: center;
}

.player-left { color: red; }
.player-right { color: blue; }

.edit-btn {
  font-size: 16px;
  margin-top: 5px;
  cursor: pointer;
}

/* Score Hauptbereich */
#scores {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  height: 38vh; /* iPad-optimiert */
  position: relative;
  z-index: 1;
}

.score {
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 260px; /* iPad 6 optimiert */
  font-weight: bold;
  user-select: none;
}

#s1 { color: red; }
#s2 { color: blue; }

/* Doppelpunkt */
#colon {
  font-size: 150px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Buttons unter den Scores */
#controls {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  margin-top: 10px; /* statt negativ */
  align-items: center;
  position: relative;
  z-index: 10;
}

.control-row {
  display: flex;
  justify-content: center;
  gap: 20px;
}

/* Untere Buttons */
#bottom-controls {
  text-align: center;
  margin-top: 10px;
}

button {
  font-size: 20px;
  padding: 10px 16px;
  margin: 4px;
}
</style>

</head>

<body>

<div id="header">SCOREBOARD</div>

<div id="break-info">
  <span id="break-text">Next Break: Rot</span>
</div>

<div id="players">
  <div class="player-box">
    <div id="p1" class="player-left">Spieler 1</div>
    <button class="edit-btn" onclick="changeName(1)">✏️</button>
  </div>

  <div class="player-box">
    <div id="p2" class="player-right">Spieler 2</div>
    <button class="edit-btn" onclick="changeName(2)">✏️</button>
  </div>
</div>

<div id="scores">
  <div id="s1" class="score">0</div>
  <div id="colon">:</div>
  <div id="s2" class="score">0</div>
</div>

<div id="controls">
  <div class="control-row">
    <button onclick="add(1)">+1</button>
    <button onclick="sub(1)">-1</button>
  </div>

  <div></div>

  <div class="control-row">
    <button onclick="add(2)">+1</button>
    <button onclick="sub(2)">-1</button>
  </div>
</div>

<div id="bottom-controls">
  <button onclick="swap()">↔ Seitenwechsel</button>
  <button onclick="newGame()">🔄 Neues Match</button>
</div>

<script>
let state = {
  player1: "Spieler 1",
  player2: "Spieler 2",
  score1: 0,
  score2: 0,
  nextBreak: 1
};

function load() {
  let saved = localStorage.getItem("billard");
  if (saved) {
    state = JSON.parse(saved);
    if (state.nextBreak !== 1 && state.nextBreak !== 2) {
      state.nextBreak = 1;
    }
  } else {
    state.nextBreak = 1;
  }
  save();
  render();
}

function save() {
  localStorage.setItem("billard", JSON.stringify(state));
}

function updateBreakDisplay() {
  const el = document.getElementById("break-text");
  if (state.nextBreak === 1) {
    el.textContent = "Next Break: Rot";
    el.style.color = "red";
  } else {
    el.textContent = "Next Break: Blau";
    el.style.color = "blue";
  }
}

function render() {
  document.getElementById("p1").textContent = state.player1;
  document.getElementById("p2").textContent = state.player2;
  document.getElementById("s1").textContent = state.score1;
  document.getElementById("s2").textContent = state.score2;
  updateBreakDisplay();
}

function toggleBreak() {
  state.nextBreak = (state.nextBreak === 1 ? 2 : 1);
}

function add(player) {
  if (player === 1) state.score1 += 1;
  else state.score2 += 1;

  toggleBreak();
  save();
  render();
}

function sub(player) {
  let changed = false;

  if (player === 1 && state.score1 > 0) {
    state.score1 -= 1;
    changed = true;
  } else if (player === 2 && state.score2 > 0) {
    state.score2 -= 1;
    changed = true;
  }

  if (changed) toggleBreak();
  save();
  render();
}

/* Große Zähler per Klick bedienen */
document.getElementById("s1").addEventListener("click", () => add(1));
document.getElementById("s2").addEventListener("click", () => add(2));

function swap() {
  [state.player1, state.player2] = [state.player2, state.player1];
  [state.score1, state.score2] = [state.score2, state.score1];
  save();
  render();
}

function changeName(player) {
  let name = prompt("Neuer Name:");
  if (!name) return;

  if (player === 1) state.player1 = name;
  else state.player2 = name;

  save();
  render();
}

function newGame() {
  if (!confirm("Neues Match starten?")) return;

  state.score1 = 0;
  state.score2 = 0;
  state.nextBreak = 1; // Rot beginnt immer neu

  if (confirm("Spieler neu eingeben?")) {
    state.player1 = prompt("Name Spieler Rot:", state.player1) || state.player1;
    state.player2 = prompt("Name Spieler Blau:", state.player2) || state.player2;
  }

  save();
  render();
}

load();
</script>

</body>
</html>
